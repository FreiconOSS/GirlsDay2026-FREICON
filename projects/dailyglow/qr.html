<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DailyGlow – QR Code</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ff9a9e, #fecfef, #ffecd2);
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background: white;
      border-radius: 32px;
      padding: 48px 56px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 420px;
      width: 90%;
    }

    .emoji { font-size: 64px; margin-bottom: 12px; }

    h1 {
      font-size: 2.4rem;
      background: linear-gradient(90deg, #ff6b9d, #c44dff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #888;
      font-size: 1rem;
      margin-bottom: 32px;
    }

    #qrcode {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    #qrcode canvas {
      border-radius: 16px;
      border: 4px solid #ffecd2;
    }

    .url {
      font-size: 0.75rem;
      color: #aaa;
      word-break: break-all;
      margin-bottom: 24px;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(90deg, #ff6b9d, #c44dff);
      color: white;
      padding: 10px 24px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">✨</div>
    <h1>DailyGlow</h1>
    <p class="subtitle">GirlsDay 2026 bei FREICON</p>

    <div id="qrcode"></div>

    <p class="url">https://freiconoss.github.io/GirlsDay2026-FREICON/projects/dailyglow/</p>

    <div class="badge">📱 Einfach scannen!</div>

    <p class="footer">Made with 💜 beim GirlsDay 2026</p>
  </div>

  <script>
    new QRCode(document.getElementById('qrcode'), {
      text: 'https://freiconoss.github.io/GirlsDay2026-FREICON/projects/dailyglow/',
      width: 220,
      height: 220,
      colorDark: '#c44dff',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
