<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎤 GirlsDay — Sprich mit KI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      user-select: none;
    }

    h1 {
      font-size: 1.4rem;
      color: #aaa;
      font-weight: 400;
      letter-spacing: 0.05em;
    }

    /* Der große Drückknopf */
    #btn {
      width: 200px;
      height: 200px;
      border-radius: 50%;
      border: 4px solid #444;
      background: #1e1e2e;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.15s ease;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    #btn:hover { border-color: #666; background: #252535; }

    #btn.listening {
      border-color: #ff4f4f;
      background: #2a1515;
      box-shadow: 0 0 40px rgba(255, 79, 79, 0.4);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(255,79,79,0.3); }
      50%       { box-shadow: 0 0 60px rgba(255,79,79,0.6); }
    }

    #mic-icon { font-size: 3.5rem; }
    #btn-label { font-size: 0.85rem; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }
    #btn.listening #btn-label { color: #ff6666; }

    /* Hint: Leertaste */
    #hint {
      font-size: 0.8rem;
      color: #555;
    }

    kbd {
      background: #222;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 2px 8px;
      font-family: monospace;
      color: #aaa;
      font-size: 0.9em;
    }

    /* Ergebnis-Box */
    #result-box {
      width: min(480px, 90vw);
      min-height: 80px;
      background: #1a1a2a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 16px 20px;
      font-size: 1.05rem;
      line-height: 1.6;
      color: #e0e0e0;
      position: relative;
    }

    #result-text {
      min-height: 40px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #result-text.placeholder { color: #555; font-style: italic; }

    /* Kopiert-Badge */
    #copied-badge {
      position: absolute;
      top: 10px;
      right: 14px;
      background: #2d6a4f;
      color: #74c69d;
      font-size: 0.75rem;
      padding: 2px 10px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #copied-badge.show { opacity: 1; }

    /* Name-Buttons */
    #names {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .name-btn {
      background: #1e1e2e;
      border: 1px solid #444;
      color: #ccc;
      padding: 8px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.15s;
    }

    .name-btn:hover { border-color: #888; color: white; }
    .name-btn.active { border-color: #a78bfa; color: #a78bfa; background: #1a1428; }

    #active-name {
      font-size: 0.85rem;
      color: #a78bfa;
      height: 1.2em;
    }

    /* Status */
    #status {
      font-size: 0.8rem;
      color: #555;
      height: 1em;
    }
    #status.error { color: #ff6666; }
  </style>
</head>
<body>

  <h1>🎤 Sprich mit der KI</h1>

  <!-- Name-Auswahl -->
  <div id="names">
    <button class="name-btn" data-name="Leni">Leni</button>
    <button class="name-btn" data-name="Marlen">Marlen</button>
    <button class="name-btn" data-name="Lotta">Lotta</button>
    <button class="name-btn" data-name="Andreas">Andreas</button>
  </div>
  <div id="active-name"></div>

  <!-- Drückknopf -->
  <button id="btn" title="Halten zum Sprechen">
    <span id="mic-icon">🎤</span>
    <span id="btn-label">Halten &amp; Sprechen</span>
  </button>

  <div id="hint">oder <kbd>Leertaste</kbd> halten</div>

  <!-- Ergebnis -->
  <div id="result-box">
    <div id="result-text" class="placeholder">Dein Text erscheint hier …</div>
    <div id="copied-badge">✓ Kopiert!</div>
  </div>

  <div id="status"></div>

<script>
  // ── State ──────────────────────────────────────────────
  let activeName   = '';
  let recognition  = null;
  let isListening  = false;
  let finalText    = '';

  const btn          = document.getElementById('btn');
  const btnLabel     = document.getElementById('btn-label');
  const micIcon      = document.getElementById('mic-icon');
  const resultText   = document.getElementById('result-text');
  const copiedBadge  = document.getElementById('copied-badge');
  const activeNameEl = document.getElementById('active-name');
  const statusEl     = document.getElementById('status');

  // ── Name-Buttons ───────────────────────────────────────
  document.querySelectorAll('.name-btn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.name-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      activeName = b.dataset.name;
      activeNameEl.textContent = `Spricht: ${activeName}`;
    });
  });

  // ── Speech Recognition Setup ───────────────────────────
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    statusEl.textContent = '⚠️ Bitte Chrome oder Edge nutzen — dieses Browser unterstützt keine Spracheingabe.';
    statusEl.classList.add('error');
    btn.disabled = true;
  } else {
    recognition = new SpeechRecognition();
    recognition.lang = 'de-DE';
    recognition.interimResults = true;
    recognition.continuous = false;

    recognition.onresult = (e) => {
      let interim = '';
      finalText = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) {
          finalText += e.results[i][0].transcript;
        } else {
          interim += e.results[i][0].transcript;
        }
      }
      const display = finalText || interim;
      showText(display, false);
    };

    recognition.onend = () => {
      if (isListening) {
        // Wurde noch nicht manuell gestoppt — Resultat übernehmen
        stopListening(true);
      }
    };

    recognition.onerror = (e) => {
      if (e.error === 'no-speech') return;
      statusEl.textContent = `Fehler: ${e.error}`;
      statusEl.classList.add('error');
      stopListening(false);
    };
  }

  // ── Start / Stop ───────────────────────────────────────
  function startListening() {
    if (isListening || !recognition) return;
    isListening = true;
    finalText = '';
    btn.classList.add('listening');
    btnLabel.textContent = 'Zuhören …';
    micIcon.textContent = '🔴';
    statusEl.textContent = '';
    statusEl.classList.remove('error');
    recognition.start();
  }

  function stopListening(commit) {
    if (!isListening) return;
    isListening = false;
    btn.classList.remove('listening');
    btnLabel.textContent = 'Halten & Sprechen';
    micIcon.textContent = '🎤';
    try { recognition.stop(); } catch(_) {}

    if (commit && finalText.trim()) {
      const prefix = activeName ? `${activeName}: ` : '';
      const message = prefix + finalText.trim();
      showText(message, false);
      copyToClipboard(message);
    }
  }

  // ── Anzeige ────────────────────────────────────────────
  function showText(text, placeholder) {
    resultText.textContent = text;
    resultText.classList.toggle('placeholder', placeholder);
  }

  function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
      copiedBadge.classList.add('show');
      statusEl.textContent = '✓ In Zwischenablage — einfach in VS Code einfügen (Cmd+V)';
      setTimeout(() => copiedBadge.classList.remove('show'), 2000);
      setTimeout(() => { statusEl.textContent = ''; }, 3000);
    });
  }

  // ── Maus / Touch ───────────────────────────────────────
  btn.addEventListener('mousedown',  (e) => { e.preventDefault(); startListening(); });
  btn.addEventListener('mouseup',    ()  => stopListening(true));
  btn.addEventListener('mouseleave', ()  => { if (isListening) stopListening(true); });

  btn.addEventListener('touchstart', (e) => { e.preventDefault(); startListening(); }, { passive: false });
  btn.addEventListener('touchend',   ()  => stopListening(true));

  // ── Leertaste ──────────────────────────────────────────
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && !e.repeat && document.activeElement !== btn) {
      e.preventDefault();
      startListening();
    }
  });
  document.addEventListener('keyup', (e) => {
    if (e.code === 'Space') {
      e.preventDefault();
      stopListening(true);
    }
  });
</script>
</body>
</html>
